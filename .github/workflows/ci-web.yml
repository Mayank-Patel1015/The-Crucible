name: CI — Web

on:
  push:
    branches: [main]
    paths:
      - 'crucible-web/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crucible-web/**'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crucible-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crucible-web/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
