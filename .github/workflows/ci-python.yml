name: CI — Python

on:
  push:
    branches: [main]
    paths:
      - '*.py'
      - 'tests/**'
      - 'schema.sql'
      - '.github/workflows/ci-python.yml'
  pull_request:
    branches: [main]
    paths:
      - '*.py'
      - 'tests/**'
      - 'schema.sql'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - run: pip install ruff pytest

      - run: ruff check .

      - run: pytest tests/ -v
